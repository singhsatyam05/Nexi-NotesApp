## Architecture

The app follows a simple **3-layer architecture**:

```
Screens (UI)
    │
    ▼
Services (Business Logic / File I/O)
    │
    ▼
Models (Data)
```

- **`Note` model** — Immutable data class with `toJson`, `fromJson`, `copyWith`, `==`, and `hashCode`.
- **`NotesService`** — Handles all file operations and encryption/decryption. No external state.
- **Screens** — Stateful Flutter widgets that call `NotesService` directly and manage local UI state.

---

## Data Flow

```
User types note
    │
    ▼
NoteEditorScreen._saveNote()
    │
    ▼
NotesService.updateNote()
    │── Loads full notes list from file
    │── Updates the changed note in the list
    │── Re-serialises list → JSON → XOR encrypt → Base64 → write to disk
    ▼
nexii_notes.json  (encrypted on device)
```

---

## Security

| Mechanism | Implementation |
|---|---|
| **Password validation** | Plain-string comparison against a hardcoded master password |
| **Encryption** | XOR cipher using the password as a repeating key |
| **Encoding** | Base64 wraps the raw XOR-encrypted bytes |
| **Storage** | Encrypted JSON written to the app's documents directory via `path_provider` |
| **Networking** | None — app has no network calls |

> ⚠️ **Note:** The current XOR encryption is suitable for demonstration / educational purposes. For production use, replace with **AES-256** (e.g., via the `encrypt` package) and use a securely generated & stored key derivation function such as **PBKDF2** or **Argon2**.

---

## Storage

Notes are stored in a single encrypted file:

| Platform | Path |
|---|---|
| Android / iOS | `<app documents directory>/nexii_notes.json` |
| Windows | `%APPDATA%\com.example.nexii\nexii_notes.json` |
| Linux / macOS | `~/.local/share/nexii/nexii_notes.json` |

**File format (before encryption):**
```json
{
  "version": "1.0",
  "timestamp": "2026-02-24T12:00:00.000Z",
  "notes": [
    {
      "id": "1708772400000",
      "title": "My Note",
      "content": "Note body text...",
      "createdAt": "2026-02-24T12:00:00.000Z",
      "updatedAt": "2026-02-24T12:05:00.000Z"
    }
  ]
}
```

