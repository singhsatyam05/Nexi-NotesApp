## Known Limitations

- Hardcoded master password (no user-settable password flow yet)
- XOR encryption — not suitable for sensitive production data
- No search or filter functionality on the notes list
- No note categories / tags
- No export / backup feature
- `flutter_secure_storage`, `crypto`, and `shared_preferences` are imported but reserved for future enhancements

