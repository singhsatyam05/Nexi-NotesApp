## Usage

1. **Launch** the app — you will see the login screen.
2. **Enter the master password** and tap **"Unlock Nexii"**.
3. **Notes List** — tap **＋** to create a new note (you'll be prompted for a title).
4. **Edit** — tap any note card to open the full editor.
5. **Save** — tap the save button (or the floating save button) when you're done.
6. **Delete** — use the ⋮ menu on a note card or inside the editor.
7. **Storage Info** — tap the ℹ icon in the app bar of the notes list.
8. **Logout** — tap the logout icon to return to the login screen.

