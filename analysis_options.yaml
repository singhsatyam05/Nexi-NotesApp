# Nexii — Secure Notes App

A **Flutter-based secure notes application** that stores your notes in an encrypted file, entirely on your device. No internet connection required, no cloud sync — your data stays local.

---

## Features

| Feature | Description |
|---|---|
| 🔐 Password Login | App is locked with a master password on every launch |
| 🔒 Encrypted Storage | Notes are XOR-encrypted and Base64-encoded before being written to disk |
| 📝 Rich Note Editor | Full-screen editor with title + content fields and an unsaved-changes indicator |
| 🗂️ Note Management | Create, open, edit, and delete notes from the notes list |
| 💾 Manual Save | Save button appears only when there are unsaved changes |
| ⚠️ Unsaved-Changes Guard | Prompts to save or discard when navigating away with unsaved changes |
| 📊 Storage Info | View the encrypted file's path, size, and last-modified timestamp |
| 📱 Cross-Platform | Targets Android, iOS, Windows, Linux, macOS, and Web via Flutter |
| 🚫 Local Only | No network calls — all data stays on the device |

