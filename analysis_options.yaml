## Getting Started

### Prerequisites

- **Flutter SDK** `3.8.1` or higher (`sdk: ^3.8.1`)
- **Dart** (bundled with Flutter)
- **Android Studio** (for Android builds) or **Xcode** (for iOS/macOS builds)
- An Android device / emulator **or** a desktop target (Windows, Linux, macOS)

### Installation

1. **Clone the repository**
   ```bash
   git clone <your-repo-url>
   cd nexii
   ```

2. **Install dependencies**
   ```bash
   flutter pub get
   ```

3. **Enable Developer Mode** *(Windows only — required for symlink support)*
   ```bash
   start ms-settings:developers
   ```

4. **Run the app**
   ```bash
   # Android emulator / device
   flutter run

   # Specific target
   flutter run -d windows
   flutter run -d chrome
   ```

